logRoot: logs
repoRoot: repos           # stores all cloned source repositories
dbRoot: codeql-db         # stores all CodeQL databases, dbRoot/<dbName>/

# source repositories to clone
repositories:
  - urlPrefix: https://github.com/
    dir: github.com
    repos:
      - rclone/rclone 28c187b       # optional branch/commit
      - cloudwego/kitex
      - Lslightly/dolt heapvar_should_move
      - Lslightly/kitex-examples heapvar_should_move

# build — create CodeQL databases
# dbName is the database name, used as the directory under dbRoot/.
#   - empty or omitted: use the repository name as the database name
#   - explicitly set:   use the given name (e.g. "rclone-custom")
# The same repository can be built with different methods,
# producing databases with different names.
# dbName must be unique across all build groups.
#
# buildCmd — the build command passed to codeql.
#   - empty or omitted: use the default build method (codeql auto-detects)
#   - set:              a shell command(arguments are separated by space. Notice that if
#                       there are spaces between "", like "-f -l", then build script can be used) or path to a build script
#
# extgenScript (optional) — external predicate generation script.
#   - empty or omitted: skip extgen for this database
#   - "goescape":      run go build -gcflags=-m=2 and convert to CSV
#   - custom script:   path to a script (see genScript in the old schema)
language: go
buildTimeout: 3600
buildGrps:
  # rclone default build
  - buildRepos: [rclone/rclone]
    extgenScript: goescape

  # same rclone, different build → explicit dbName to avoid conflict
  - buildRepos: [rclone/rclone]
    dbName: rclone-custom
    buildCmd: go build -a ./...
    extgenScript: goescape

  # dolt
  - buildRepos: [Lslightly/dolt]
    extgenScript: yaml-examples/extgens/dolt.sh

  # kitex-examples
  - buildRepos: [Lslightly/kitex-examples]
    buildCmd: yaml-examples/build/kitex-examples.sh
    extgenScript: yaml-examples/extgens/kitex-examples.sh

  # kitex
  - buildRepos: [cloudwego/kitex]
    buildCmd: go build -a ./...
    extgenScript: goescape

# query — run queries against databases
# queryDBs lists the databases to query (by dbName).
#   "*" — scan all databases under dbRoot/
#   "-" — all databases defined in buildGrps
queryconfig:
  resultRoot: codeqlResult
  parallelCore: 20
  queryGrps:
    - queryDBs:
        - rclone
        - rclone-custom
        - dolt
        - kitex-examples
        - kitex
      queries:
        - escape_ext/heapvar_should_move.ql
      externals: [movedToHeap]